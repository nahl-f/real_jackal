  # Nav2 Parameters for Clearpath Jackal (ROS2 Jazzy/Humble)
  # Tested: 2026-02-19
  # ROS2 Distro: Jazzy, Humble
  # Hardware: Jackal + Velodyne VLP16 + SICK LMS111
/**:
  amcl:
    ros__parameters:
      use_sim_time: False
      alpha1: 0.2
      alpha2: 0.2
      alpha3: 0.2
      alpha4: 0.2
      base_frame_id: "base_link"
      beam_skip_distance: 0.5
      beam_skip_error_threshold: 0.9
      beam_skip_threshold: 0.8
      do_beamskip: False
      global_frame_id: "map"
      lambda_short: 0.1
      laser_likelihood_max_dist: 2.0
      laser_max_range: 100.0
      laser_min_range: -1.0
      laser_model_type: "likelihood_field"
      max_beams: 60
      max_particles: 3000
      min_particles: 1000
      odom_frame_id: "odom"
      pf_err: 0.05
      pf_z: 0.99
      recovery_alpha_fast: 0.0
      recovery_alpha_slow: 0.0
      resample_interval: 1
      robot_model_type: "nav2_amcl::DifferentialMotionModel"
      sigma_hit: 0.2
      tf_broadcast: True
      transform_tolerance: 1.0
      update_min_a: 0.2
      update_min_d: 0.25
      z_hit: 0.5
      z_max: 0.65
      z_rand: 0.5
      z_short: 0.0

  bt_navigator:
    ros__parameters:
      use_sim_time: False
      global_frame: map
      robot_base_frame: base_link
      odom_topic: /jackal1/platform/odom
      enable_groot_monitoring: True
      groot_zmq_publisher_port: 1666
      groot_zmq_server_port: 1667
      default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
      bt_loop_duration: 10s
      default_server_timeout: 20s

  controller_server:
    ros__parameters:
      use_sim_time: False
      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.5
      min_theta_velocity_threshold: 0.001
      failure_tolerance: 0.3
      progress_checker_plugin: "progress_checker"
      goal_checker_plugin: "goal_checker"
      controller_plugins: ["FollowPath"]

      progress_checker:
        plugin: "nav2_controller_plugins::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0

      goal_checker:
        plugin: "nav2_controller_plugins::SimpleGoalChecker"
        xy_goal_tolerance: 0.3
        yaw_goal_tolerance: 0.3

      FollowPath:
        plugin: "nav2_dwb_controller::DWBLocalPlanner"
        debug_trajectory_details: True
        min_vel_x: 0.0
        min_vel_y: 0.0
        max_vel_x: 1.5
        max_vel_y: 0.0
        max_vel_theta: 2.0
        min_speed_xy: 0.0
        max_speed_xy: 1.5
        min_speed_theta: 0.0
        acc_lim_x: 2.5
        acc_lim_y: 0.0
        acc_lim_theta: 3.2
        decel_lim_x: -2.5
        decel_lim_y: 0.0
        decel_lim_theta: -3.2
        vx_samples: 20
        vy_samples: 5
        vtheta_samples: 40
        sim_time: 1.5
        linear_granularity: 0.05
        angular_granularity: 0.025
        transform_tolerance: 0.2
        xy_goal_tolerance: 0.3
        trans_stopped_velocity: 0.25
        timeout_seconds: 5.0

  local_costmap:
    local_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: odom
        robot_base_frame: base_link
        use_sim_time: False
        rolling_window: True
        width: 10
        height: 10
        resolution: 0.05

  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: map
        robot_base_frame: base_link
        use_sim_time: False
        robot_radius: 0.468
        resolution: 0.05

  planner_server:
    ros__parameters:
      use_sim_time: False
      expected_planner_frequency: 20.0
      planner_plugins: ["GridBased"]
      GridBased:
        plugin: "nav2_navfn_planner/NavfnPlanner"
        tolerance: 0.5
        use_astar: False
        allow_unknown: True